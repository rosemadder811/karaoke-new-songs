<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TJ 노래방 통합 일어곡 검색 플랫폼</title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: #f1f5f9;
      margin: 0;
      padding: 20px;
      color: #334155;
    }

    .container {
      max-width: 750px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      color: #0f172a;
      margin-bottom: 25px;
      font-weight: 800;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: white;
    }

    .search-box input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .search-box button {
      padding: 0 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 25px;
      justify-content: center;
    }

    .tab-btn {
      padding: 10px 20px;
      background: #e2e8f0;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      color: #475569;
    }

    .tab-btn.active {
      background: #0f172a;
      color: white;
    }

    .list-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .song-card {
      display: flex;
      align-items: center;
      background: white;
      padding: 16px;
      border-radius: 14px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      border-left: 6px solid #cbd5e1;
    }

    .song-card.jpop {
      border-left-color: #3b82f6;
    }

    .song-card.animation {
      border-left-color: #ef4444;
    }

    .song-card.vocaloid {
      border-left-color: #10b981;
    }

    .song-id {
      font-size: 24px;
      font-weight: 900;
      color: #1d4ed8;
      width: 95px;
      letter-spacing: -0.5px;
    }

    .song-info {
      flex: 1;
    }

    .song-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .song-title {
      font-size: 16.5px;
      font-weight: 700;
      color: #0f172a;
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: bold;
    }

    .tieup-badge {
      background: #fee2e2;
      color: #991b1b;
    }

    .vocaloid-badge {
      background: #d1fae5;
      color: #065f46;
    }

    .song-meta-row {
      display: flex;
      gap: 15px;
      margin-top: 6px;
      font-size: 13.5px;
      color: #64748b;
      flex-wrap: wrap;
    }

    .song-artist {
      font-weight: 500;
    }

    .song-composer {
      color: #0ea5e9;
      font-weight: 500;
    }

    .fav-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #e2e8f0;
    }

    .fav-btn.active {
      color: #eab308;
    }

    .no-result {
      text-align: center;
      padding: 40px;
      color: #64748b;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎶 일본곡 통합 노래방 검색기</h1>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="곡 번호, 제목, 보컬로이드 캐릭터, 작곡가(프로듀서) 검색...">
        <button id="searchBtn">검색</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">전체 목록</button>
        <button class="tab-btn" onclick="switchTab('jpop')">J-POP</button>
        <button class="tab-btn" onclick="switchTab('animation')">애니메이션</button>
        <button class="tab-btn" onclick="switchTab('vocaloid')">보컬로이드</button>
      </div>

      <div id="songList" class="list-container"></div>
    </div>

    <script src="api.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const initialSongs = await Api.getAllSongs();
        Api.renderSongList(initialSongs, 'songList');

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') handleSearch();
        });
        document.getElementById('searchBtn').addEventListener('click', handleSearch);
      });

      async function handleSearch() {
        const query = document.getElementById('searchInput').value;
        const results = await Api.searchSongs(query);
        Api.renderSongList(results, 'songList');
      }

      async function switchTab(type) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        let songs = [];
        if (type === 'all') {
          songs = await Api.getAllSongs();
        } else {
          songs = await Api.getSongsByCategory(type);
        }
        Api.renderSongList(songs, 'songList');
      }

      function toggleFavorite(btn, id) {
        btn.classList.toggle('active');
      }
    </script>
</body>

</html>
