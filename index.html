<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TJ노래방 J-POP & 보컬로이드 라이브러리</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>" />
</head>

<body>

  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <header class="site-header" role="banner">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">🎤</div>
        <div class="logo-text">
          <span class="logo-main">TJ노래방 J-POP</span>
          <span class="logo-sub">VOCALOID &amp; PRONUNCIATION DASHBOARD</span>
        </div>
      </div>
      <div class="header-meta">
        <button id="global-search-btn" class="global-search-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <span class="search-btn-text">곡 검색</span>
          <kbd class="search-kbd">Ctrl+K</kbd>
        </button>
        <span class="live-badge"><span class="live-dot"></span>LIVE</span>
        <span class="update-time" id="last-updated">--</span>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-content">
        <div class="hero-label">🎵 보컬로이드 완벽 매핑 및 한국어 발음 전용 패널</div>
        <h1 class="hero-title">J-POP &amp; <span class="gradient-text">보컬로이드</span> 통합 디렉토리</h1>
        <p class="hero-desc">보컬로이드 캐릭터 분류 칩을 클릭하여 하츠네 미쿠, 카가미네 린/렌 등의 곡을 손쉽게 필터링하세요.</p>
      </div>
    </div>
  </section>

  <nav class="tab-nav-wrapper">
    <div class="tab-nav" role="tablist">
      <button class="tab-btn active" data-tab="newsong">✨ 신곡 업데이트 <span class="tab-count">—</span></button>
      <button class="tab-btn" data-tab="jpoplib">🇯🇵 J-POP 라이브러리 <span class="tab-count">—</span></button>
      <button class="tab-btn" data-tab="vocaloid">💜 보컬로이드 분류 <span class="tab-count">—</span></button>
      <button class="tab-btn" data-tab="bookmark">⭐ 북마크 <span class="tab-count">0</span></button>
    </div>
  </nav>

  <main class="main-content">
    <section id="section-newsong" class="tab-section active">
      <div class="section-header">
        <h2 class="section-title">✨ 최신 신곡 업데이트 <span id="newsong-count"
            style="font-size:12px;color:var(--text-muted);margin-left:6px"></span></h2>
        <div class="filter-bar">
          <input type="text" id="new-keyword" placeholder="곡명, 가수 검색..."
            style="background:var(--bg-card);border:1px solid var(--border-subtle);color:#fff;padding:5px 10px;border-radius:4px;" />
          <select id="new-sort"
            style="background:var(--bg-card);border:1px solid var(--border-subtle);color:#fff;padding:5px 10px;border-radius:4px;">
            <option value="date">최신순</option>
            <option value="title">제목순</option>
            <option value="songno">번호순</option>
          </select>
        </div>
      </div>
      <div class="song-grid" id="newsong-grid"></div>
    </section>

    <section id="section-jpoplib" class="tab-section">
      <div class="section-header">
        <h2 class="section-title">🇯🇵 J-POP 전체 라이브러리 <span id="jpoplib-count"
            style="font-size:12px;color:var(--text-muted);margin-left:6px"></span></h2>
        <div class="filter-bar">
          <input type="text" id="jpop-keyword" placeholder="곡명, 발음 검색..."
            style="background:var(--bg-card);border:1px solid var(--border-subtle);color:#fff;padding:5px 10px;border-radius:4px;" />
        </div>
      </div>
      <div class="song-grid" id="jpoplib-grid"></div>
    </section>

    <section id="section-vocaloid" class="tab-section">
      <div class="section-header">
        <h2 class="section-title">💜 보컬로이드 분류 수록곡 <span id="vocaloid-count"
            style="font-size:12px;color:var(--text-muted);margin-left:6px"></span></h2>
        <div class="filter-bar">
          <input type="text" id="voca-keyword" placeholder="곡명, 프로듀서 검색..."
            style="background:var(--bg-card);border:1px solid var(--border-subtle);color:#fff;padding:5px 10px;border-radius:4px;" />
        </div>
      </div>
      <div class="char-chips-wrapper">
        <button class="char-chip active" data-char="all">전체</button>
        <button class="char-chip" data-char="miku">하츠네 미쿠</button>
        <button class="char-chip" data-char="rin">카가미네 린</button>
        <button class="char-chip" data-char="len">카가미네 렌</button>
        <button class="char-chip" data-char="luka">메구리네 루카</button>
        <button class="char-chip" data-char="kaito">KAITO</button>
        <button class="char-chip" data-char="meiko">MEIKO</button>
        <button class="char-chip" data-char="gumi">GUMI</button>
        <button class="char-chip" data-char="ia">IA</button>
      </div>
      <div class="song-grid" id="vocaloid-grid"></div>
    </section>

    <section id="section-bookmark" class="tab-section">
      <div class="section-header">
        <h2 class="section-title">⭐ 마이 북마크 컬렉션</h2>
      </div>
      <div class="song-grid" id="bookmark-grid"></div>
    </section>
  </main>

  <div id="global-search-modal" class="search-modal" hidden>
    <div id="modal-overlay-bg" class="search-modal-overlay"></div>
    <div class="search-modal-container">
      <div class="search-modal-header">
        <input type="search" id="modal-search-input" placeholder="통합 검색 (제목, 발음, 번호)..." autocomplete="off" />
        <button id="modal-close-btn" class="modal-close-btn">✕</button>
      </div>
      <div class="search-modal-results" id="modal-results-container"></div>
    </div>
  </div>

  <button id="scroll-top" class="scroll-top">↑</button>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>© TJ 노래방 J-POP &amp; 보컬로이드 대시보드</p>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>

</html>
