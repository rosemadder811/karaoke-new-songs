<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TJ 일본송 마스터 검색기</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-base: #08060f;
      --bg-surface: #120f1f;
      --border-purple: rgba(157, 78, 221, 0.3);
      --color-accent: #9d4edd;
      --text-primary: #f3f0f7;
      --text-secondary: #9a95a6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      padding: 20px;
    }

    .wrapper {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      text-align: center;
      padding: 10px;
    }

    header h1 {
      font-size: 2.2rem;
      margin-bottom: 5px;
      background: linear-gradient(to right, #e0aaff, #9d4edd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .search-area {
      background: var(--bg-surface);
      border: 1px solid var(--border-purple);
      padding: 15px;
      border-radius: 12px;
    }

    .search-area input {
      width: 100%;
      padding: 12px 15px;
      background: #08060f;
      border: 1px solid var(--border-purple);
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    .search-area input:focus {
      border-color: #e0aaff;
    }

    .nav-tabs {
      display: flex;
      gap: 10px;
      border-bottom: 2px solid var(--border-purple);
      padding-bottom: 10px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      font-weight: bold;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .tab-btn.active,
    .tab-btn:hover {
      background: var(--color-accent);
      color: #fff;
    }

    .main-container {
      display: flex;
      gap: 20px;
      min-height: 500px;
    }

    .sub-sidebar {
      width: 300px;
      background: var(--bg-surface);
      border: 1px solid var(--border-purple);
      border-radius: 12px;
      padding: 15px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .sub-sidebar h3 {
      font-size: 1.1rem;
      border-bottom: 1px solid var(--border-purple);
      padding-bottom: 8px;
      margin-bottom: 5px;
    }

    .sub-list {
      list-style: none;
      overflow-y: auto;
      max-height: 600px;
    }

    .sub-item {
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sub-item:hover,
    .sub-item.active {
      background: rgba(157, 78, 221, 0.2);
      color: #fff;
      font-weight: bold;
    }

    .grid-view {
      flex-grow: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 15px;
      align-content: flex-start;
    }

    .song-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-purple);
      border-radius: 10px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: bold;
      color: #e0aaff;
    }

    .bookmark-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
    }

    .bookmark-btn.active {
      color: #ffbc00;
    }

    .song-title {
      font-size: 1.15rem;
      font-weight: bold;
      color: #fff;
      line-height: 1.3;
    }

    .song-yomi {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .song-artist {
      font-size: 0.85rem;
      color: var(--text-secondary);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 8px;
      margin-top: auto;
    }

    .song-artist span {
      color: #fff;
    }

    .star-tag {
      background: rgba(255, 90, 90, 0.15);
      color: #ff5a5a;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <header>
      <h1>🎤 TJ 일본송 통합 데이터 허브</h1>
    </header>

    <div class="search-area">
      <input type="text" id="mainSearch" placeholder="곡 번호, 제목, 아티스트, 독음, 타이업 실시간 통합 검색...">
    </div>

    <nav class="nav-tabs">
      <button class="tab-btn active" data-type="animation">애니 노래</button>
      <button class="tab-btn" data-type="jpop">J-POP</button>
      <button class="tab-btn" data-type="vocaloid">보컬로이드</button>
      <button class="tab-btn" data-type="bookmark">★ 즐겨찾기</button>
    </nav>

    <div class="main-container">
      <aside class="sub-sidebar" id="subSidebar">
        <h3 id="sidebarTitle">소목록</h3>
        <ul class="sub-list" id="subList"></ul>
      </aside>
      <main class="grid-view" id="gridView"></main>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>

</html>
