<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노래방 신곡 & 보컬로이드 대시보드</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-default">
  <canvas id="particles-canvas"></canvas>

  <div class="dashboard-container">
    <header class="main-header">
      <h1>🎤 노래방 신곡 대시보드</h1>
      <p class="subtitle">실시간 한국어 발음 보정 및 보컬로이드 파싱 시스템</p>
    </header>

    <div id="character-profile-zone" class="profile-zone hidden">
      <div class="profile-avatar" id="profile-avatar"></div>
      <div class="profile-info">
        <h2 id="profile-name">하츠네 미쿠</h2>
        <p id="profile-desc">선택하신 캐릭터의 테마와 수록곡 목록입니다.</p>
      </div>
    </div>

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="jpop-new">J-POP 신곡</button>
      <button class="tab-btn" data-tab="jpop-full">J-POP 라이브러리</button>
      <button class="tab-btn" data-tab="vocaloid">보컬로이드</button>
    </nav>

    <div id="vocaloid-chips-container" class="chips-container hidden">
      <button class="chip-btn active" data-char="all">전체</button>
      <button class="chip-btn" data-char="miku">미쿠</button>
      <button class="chip-btn" data-char="rin">린</button>
      <button class="chip-btn" data-char="len">렌</button>
      <button class="chip-btn" data-char="luka">루카</button>
      <button class="chip-btn" data-char="kaito">카이토</button>
      <button class="chip-btn" data-char="meiko">메이코</button>
      <button class="chip-btn" data-char="gumi">GUMI</button>
      <button class="chip-btn" data-char="ia">IA</button>
    </div>

    <div class="control-bar">
      <div class="sort-selector">
        <label for="sort-select">정렬 기준:</label>
        <select id="sort-select">
          <option value="latest">최신 등록순</option>
          <option value="songNo">곡 번호순</option>
          <option value="title">제목 가나다순</option>
        </select>
      </div>
      <div class="counter-text" id="song-counter">총 0곡 검색됨</div>
    </div>

    <main class="content-area">
      <div id="songs-grid" class="songs-grid">
      </div>
      <div id="no-data-message" class="no-data hidden">
        선택하신 보컬로이드 종류에 매핑된 곡이 없습니다.
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
