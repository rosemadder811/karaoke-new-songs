<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TJ노래방 J-POP & 보컬로이드 차트 | 대시보드</title>
  <meta name="description" content="TJ노래방 J-POP 인기차트, 최신 신곡 업데이트, 보컬로이드 수록곡 및 북마크 대시보드" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>" />
</head>

<body>

  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <header class="site-header" role="banner">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">🎤</div>
        <div class="logo-text">
          <span class="logo-main">TJ노래방 차트</span>
          <span class="logo-sub">J-POP & VOCALOID DASHBOARD</span>
        </div>
      </div>
      <div class="header-meta">
        <button id="global-search-btn" class="global-search-btn" aria-label="전체 검색 열기">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <span class="search-btn-text">곡 검색</span>
          <kbd class="search-kbd">Ctrl+K</kbd>
        </button>
        <span class="live-badge"><span class="live-dot" aria-hidden="true"></span>LIVE</span>
        <span class="update-time" id="last-updated">--</span>
      </div>
    </div>
  </header>

  <section class="hero" aria-label="대시보드 소개">
    <div class="hero-inner">
      <div class="hero-content">
        <div class="hero-label">🎵 TJ 노래방 공식 데이터 기반 라이브러리</div>
        <h1 class="hero-title">J-POP &amp; <span class="gradient-text">보컬로이드</span><br />노래방 차트</h1>
        <p class="hero-desc">인기차트, 최신 업데이트 신곡, 보컬로이드 전체 수록곡과 나만의 북마크를 관리해 보세요.</p>
      </div>
    </div>
  </section>

  <nav class="tab-nav-wrapper" role="navigation" aria-label="콘텐츠 탭">
    <div class="tab-nav" role="tablist">
      <button id="tab-chart" class="tab-btn active" role="tab" aria-selected="true" aria-controls="section-chart"
        data-tab="chart">
        🏆 인기차트 <span class="tab-count">—</span>
      </button>
      <button id="tab-newsong" class="tab-btn" role="tab" aria-selected="false" aria-controls="section-newsong"
        data-tab="newsong">
        ✨ 신곡 업데이트 <span class="tab-count">—</span>
      </button>
      <button id="tab-vocaloid" class="tab-btn" role="tab" aria-selected="false" aria-controls="section-vocaloid"
        data-tab="vocaloid">
        💜 보컬로이드 <span class="tab-count">—</span>
      </button>
      <button id="tab-bookmark" class="tab-btn" role="tab" aria-selected="false" aria-controls="section-bookmark"
        data-tab="bookmark">
        ⭐ 북마크 <span class="tab-count">0</span>
      </button>
    </div>
  </nav>

  <main class="main-content" id="main-content">

    <section id="section-chart" class="tab-section active" role="tabpanel" aria-labelledby="tab-chart">
      <div class="section-header">
        <h2 class="section-title"><span class="section-icon">🏆</span> J-POP 인기차트 TOP 50 <span id="chart-count"
            style="font-size:13px;color:var(--text-muted);font-weight:400;margin-left:6px"></span></h2>
      </div>
      <div id="chart-source" class="data-source-banner" style="display:none;"></div>
      <div class="chart-list" id="chart-list-grid"></div>
    </section>

    <section id="section-newsong" class="tab-section" role="tabpanel" aria-labelledby="tab-newsong">
      <div class="section-header">
        <h2 class="section-title"><span class="section-icon">✨</span> 최신 신곡 업데이트 <span id="newsong-count"
            style="font-size:13px;color:var(--text-muted);font-weight:400;margin-left:6px"></span></h2>
        <div class="filter-bar">
          <div class="filter-input">
            <input type="text" id="new-keyword" placeholder="곡 제목, 가수, 번호 검색..." />
          </div>
          <select id="new-sort" class="filter-select">
            <option value="date">최신순</option>
            <option value="title">제목순</option>
            <option value="songno">번호순</option>
          </select>
        </div>
      </div>
      <div id="newsong-source" class="data-source-banner" style="display:none;"></div>
      <div class="song-grid" id="newsong-grid"></div>
    </section>

    <section id="section-vocaloid" class="tab-section" role="tabpanel" aria-labelledby="tab-vocaloid">
      <div class="section-header">
        <h2 class="section-title"><span class="section-icon">💜</span> 보컬로이드 수록곡 <span id="vocaloid-count"
            style="font-size:13px;color:var(--text-muted);font-weight:400;margin-left:6px"></span></h2>
        <div class="filter-bar">
          <div class="filter-input">
            <input type="text" id="voca-keyword" placeholder="곡명, 프로듀서 검색..." />
          </div>
        </div>
      </div>
      <div class="char-chips-wrapper">
        <button class="char-chip active" data-char="all">전체</button>
        <button class="char-chip" data-char="miku">하츠네 미쿠</button>
        <button class="char-chip" data-char="rin">카가미네 린</button>
        <button class="char-chip" data-char="len">카가미네 렌</button>
        <button class="char-chip" data-char="luka">메구리네 루카</button>
        <button class="char-chip" data-char="gumi">GUMI</button>
      </div>
      <div id="vocaloid-source" class="data-source-banner" style="display:none;"></div>
      <div class="song-grid" id="vocaloid-grid"></div>
    </section>

    <section id="section-bookmark" class="tab-section" role="tabpanel" aria-labelledby="tab-bookmark">
      <div class="section-header">
        <h2 class="section-title"><span class="section-icon">⭐</span> 마이 북마크</h2>
      </div>
      <div class="song-grid" id="bookmark-grid"></div>
    </section>

  </main>

  <div id="global-search-modal" class="search-modal" hidden>
    <div id="modal-overlay-bg" class="search-modal-overlay"></div>
    <div class="search-modal-container">
      <div class="search-modal-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="search" id="modal-search-input" placeholder="통합 실시간 검색 (곡 제목, 가수, 번호)..." autocomplete="off" />
        <button id="modal-close-btn" class="modal-close-btn">✕</button>
      </div>
      <div class="search-modal-results" id="modal-results-container">
        <div class="search-initial">
          <span class="search-empty-icon">🎵</span>
          <p class="search-empty-title">곡 제목 · 가수 · 곡번호로 실시간 검색하세요</p>
          <div class="search-tips">
            <span class="search-tip-item"><kbd>↑↓</kbd> 이동</span>
            <span class="search-tip-item"><kbd>Enter</kbd> 선택</span>
            <span class="search-tip-item"><kbd>Esc</kbd> 닫기</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="scroll-top" class="scroll-top" aria-label="맨 위로">↑</button>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>© TJ 노래방 J-POP 대시보드. All rights reserved.</p>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>

</html>
